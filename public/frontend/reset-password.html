<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1b2e;
      --navy-light: #1b263b;
      --navy-mid: #243447;
      --accent: #e8a045;
      --accent-dark: #c47f20;
      --teal: #2dd4bf;
      --red: #ef4444;
      --green: #22c55e;
      --white: #f8fafc;
      --muted: #64748b;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Sora', Arial, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(45,212,191,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(232,160,69,0.06) 0%, transparent 50%);
    }

    .box {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 11px 42px 11px 14px;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    input.error-input {
      border-color: var(--red);
    }

    input.success-input {
      border-color: var(--green);
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted);
      font-size: 15px;
      user-select: none;
      line-height: 1;
    }

    .toggle-eye:hover { color: var(--white); }

    .field-error {
      font-size: 11px;
      color: var(--red);
      margin-top: 5px;
      min-height: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Password rules checklist */
    .rules {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }

    .rule {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }

    .rule .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .rule.ok { color: var(--green); }
    .rule.ok .dot { background: var(--green); }
    .rule.fail { color: var(--red); }
    .rule.fail .dot { background: var(--red); }

    /* Strength bar */
    .strength-wrap {
      margin-bottom: 16px;
    }

    .strength-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #1b1b1b;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: var(--accent-dark); }
    button:active { transform: scale(0.98); }
    button:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    #msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }

    #msg.show { display: block; }
    #msg.success { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    #msg.error   { background: rgba(239,68,68,0.12);  color: var(--red);   border: 1px solid rgba(239,68,68,0.25); }
  </style>
</head>
<body>

<div class="box">
  <div class="logo" style="text-align: center;">🖥️ Computer Lab Fault Reporting<br>Resolution System</div>
  <h2>Reset Password</h2>
  <p class="subtitle">Choose a strong new password for your account.</p>

  <!-- New Password -->
  <div class="field">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="newPassword" placeholder="Enter new password" oninput="onPasswordInput()" autocomplete="new-password">
      <span class="toggle-eye" onclick="toggleEye('newPassword', this)">👁</span>
    </div>
    <div class="field-error" id="password-error"></div>
  </div>

  <!-- Strength bar -->
  <div class="strength-wrap">
    <div class="strength-label">
      <span>Password strength</span>
      <span id="strength-text">—</span>
    </div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
  </div>

  <!-- Rules checklist -->
  <div class="rules">
    <div class="rule" id="rule-length"><span class="dot"></span>8–10 characters</div>
    <div class="rule" id="rule-upper"><span class="dot"></span>Uppercase letter</div>
    <div class="rule" id="rule-lower"><span class="dot"></span>Lowercase letter</div>
    <div class="rule" id="rule-number"><span class="dot"></span>Number</div>
    <div class="rule" id="rule-special"><span class="dot"></span>Special character</div>
    <div class="rule" id="rule-repeat"><span class="dot"></span>No repeated chars</div>
    <div class="rule" id="rule-space"><span class="dot"></span>No leading/trailing space</div>
    <div class="rule" id="rule-common"><span class="dot"></span>Not a common password</div>
  </div>

  <!-- Confirm Password -->
  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirmPassword" placeholder="Confirm new password" oninput="onConfirmInput()" autocomplete="new-password">
      <span class="toggle-eye" onclick="toggleEye('confirmPassword', this)">👁</span>
    </div>
    <div class="field-error" id="confirm-error"></div>
  </div>

  <button onclick="resetPassword()" id="reset-btn">Reset Password →</button>
  <p id="msg"></p>
</div>

<script>
  // ── Same list as main.js ──
  const COMMON_PASSWORDS = [
    'password','12345678','123456789','password1','iloveyou',
    'admin123','welcome1','monkey123','dragon12','master12',
    'letmein1','sunshine','princess','football','qwerty123'
  ];

  // ── Same function as main.js (no name/studentId context here) ──
  function validatePassword(password) {
    if (password !== password.trim()) {
      return { valid: false, errors: ['Password must not start or end with a space.'] };
    }
    const pw = password.trim();
    if (pw.length < 8 || pw.length > 10) {
      return { valid: false, errors: ['Password must be between 8 and 10 characters long.'] };
    }
    if (!/[A-Z]/.test(pw)) {
      return { valid: false, errors: ['Add at least one uppercase letter'] };
    }
    if (!/[a-z]/.test(pw)) {
      return { valid: false, errors: ['Add at least one lowercase letter'] };
    }
    if (!/[0-9]/.test(pw)) {
      return { valid: false, errors: ['Add at least one number'] };
    }
    if (!/[@#$%&*!^()\-+=\[\]{};:'",./<>?\\|`~]/.test(pw)) {
      return { valid: false, errors: ['Add at least one special character'] };
    }
    if (COMMON_PASSWORDS.includes(pw.toLowerCase())) {
      return { valid: false, errors: ['Password is too common'] };
    }
    if (/(.)\1{2,}/.test(pw)) {
      return { valid: false, errors: ['No more than 2 repeated characters'] };
    }
    return { valid: true };
  }

  // ── Live rule checks (same rules, per-rule feedback) ──
  function checkRules(pw) {
    return {
      space:   pw === pw.trim(),
      length:  pw.trim().length >= 8 && pw.trim().length <= 10,
      upper:   /[A-Z]/.test(pw),
      lower:   /[a-z]/.test(pw),
      number:  /[0-9]/.test(pw),
      special: /[@#$%&*!^()\-+=\[\]{};:'",./<>?\\|`~]/.test(pw),
      common:  !COMMON_PASSWORDS.includes(pw.trim().toLowerCase()),
      repeat:  !/(.)\1{2,}/.test(pw),
    };
  }

  function onPasswordInput() {
    const pw = document.getElementById('newPassword').value;
    const checks = checkRules(pw);

    setRule('rule-space',   checks.space);
    setRule('rule-length',  checks.length);
    setRule('rule-upper',   checks.upper);
    setRule('rule-lower',   checks.lower);
    setRule('rule-number',  checks.number);
    setRule('rule-special', checks.special);
    setRule('rule-common',  checks.common);
    setRule('rule-repeat',  checks.repeat);

    // Strength score
    const score = Object.values(checks).filter(Boolean).length;
    updateStrength(score, pw.length);

    // Clear the main error if typing
    document.getElementById('password-error').textContent = '';
    document.getElementById('newPassword').classList.remove('error-input', 'success-input');

    // Also re-check confirm match live
    onConfirmInput();
  }

  function setRule(id, passed) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('ok',   passed);
    el.classList.toggle('fail', !passed);
  }

  function updateStrength(score, len) {
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    const pct  = Math.round((score / 8) * 100);
    fill.style.width = pct + '%';

    if (len === 0) {
      fill.style.background = 'transparent';
      text.textContent = '—';
    } else if (score <= 3) {
      fill.style.background = '#ef4444';
      text.textContent = 'Weak';
      text.style.color = '#ef4444';
    } else if (score <= 5) {
      fill.style.background = '#f97316';
      text.textContent = 'Fair';
      text.style.color = '#f97316';
    } else if (score <= 7) {
      fill.style.background = '#eab308';
      text.textContent = 'Good';
      text.style.color = '#eab308';
    } else {
      fill.style.background = '#22c55e';
      text.textContent = 'Strong';
      text.style.color = '#22c55e';
    }
  }

  function onConfirmInput() {
    const pw  = document.getElementById('newPassword').value;
    const cpw = document.getElementById('confirmPassword').value;
    const errEl = document.getElementById('confirm-error');
    const inp   = document.getElementById('confirmPassword');
    if (!cpw) {
      errEl.textContent = '';
      inp.classList.remove('error-input','success-input');
      return;
    }
    if (pw !== cpw) {
      errEl.textContent = '❌ Passwords do not match';
      inp.classList.add('error-input');
      inp.classList.remove('success-input');
    } else {
      errEl.textContent = '';
      inp.classList.remove('error-input');
      inp.classList.add('success-input');
    }
  }

  function toggleEye(inputId, eyeEl) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      eyeEl.textContent = '🙈';
    } else {
      input.type = 'password';
      eyeEl.textContent = '👁';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'show ' + type;
  }

  // ── Token from URL ──
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  async function resetPassword() {
    const password        = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errEl           = document.getElementById('password-error');
    const pwInput         = document.getElementById('newPassword');

    // 1. Empty check
    if (!password) {
      errEl.textContent = '❌ Password cannot be empty';
      pwInput.classList.add('error-input');
      return;
    }

    // 2. Full validation — same logic as main.js validatePassword()
    const result = validatePassword(password);
    if (!result.valid) {
      errEl.textContent = '❌ ' + result.errors[0];
      pwInput.classList.add('error-input');
      pwInput.classList.remove('success-input');
      return;
    } else {
      errEl.textContent = '';
      pwInput.classList.remove('error-input');
      pwInput.classList.add('success-input');
    }

    // 3. Confirm match
    if (password !== confirmPassword) {
      document.getElementById('confirm-error').textContent = '❌ Passwords do not match';
      document.getElementById('confirmPassword').classList.add('error-input');
      return;
    }

    // 4. Submit
    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
      const res  = await fetch('/api/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();

      if (data.message) {
        showMsg('✅ ' + data.message, 'success');
        setTimeout(() => { window.location.href = '/frontend/index.html'; }, 2000);
      } else {
        showMsg('❌ ' + (data.error || 'Something went wrong.'), 'error');
        btn.disabled = false;
        btn.textContent = 'Reset Password →';
      }
    } catch (e) {
      showMsg('❌ Network error. Please check your connection.', 'error');
      btn.disabled = false;
      btn.textContent = 'Reset Password →';
    }
  }
</script>
</body>
</html>
